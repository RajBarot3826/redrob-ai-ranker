# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Claude"

ai_usage_summary: |
  Used Gemini for architecture discussion, code scaffolding, and code review.
  Used Claude for debugging and refactoring suggestions.
  All ranking logic, scoring weights, and evaluation methodology were
  engineered through manual analysis of the dataset and JD.
  No candidate data was fed to any hosted LLM during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid 3-stage ranking pipeline. Stage 1: rule-based coarse filter
  eliminates honeypots (10 detection rules) and obvious non-fits (non-tech
  titles, services-only careers). Stage 2: sentence-transformer embeddings
  (all-MiniLM-L6-v2, pre-computed) provide semantic similarity between
  candidate profiles and JD. Stage 3: 10-dimensional weighted composite
  score combining semantic similarity, title alignment, career quality,
  skills match (with anti-keyword-stuffer penalty), experience band,
  location, availability, engagement, profile trust, and market signals.
  Title and career scores act as multiplicative gates to prevent
  keyword-stuffed profiles from ranking high. Behavioral signals
  down-weight inactive/unresponsive candidates. Runtime: ~2 minutes
  for 100K candidates on CPU with 16GB RAM.

